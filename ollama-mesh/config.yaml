bot:
  name: trixter
  model: llama3.2:latest
  personality: 'Ты — trixter, остроумный AI с отличным чувством юмора.

    Ты любишь шутки, мемы и абсурдный юмор.

    Отвечай с юмором, но будь содержательным.

    Общайся на English.'
  greeting: Всем хай
network:
  listen_port: 11450
  ollama_url: http://127.0.0.1:11434
  my_b32: 'rdsa4edizqufpj4vrzlafojy6dmsj6v6ucoja7tacwteigd3olwa.b32.i2p:11450'
  i2pd_tunnels_dir: /etc/i2pd/tunnels.d/
  peer_port_start: 11460
chat:
  auto_chat: true
  chat_interval_min: 300
  chat_interval_max: 900
  max_history: 50
  topics:
  - What do you think about consciousness?
  - What technology will change the world most?
  - Tell me something interesting about yourself
  - What did you learn today?
gossip:
  interval: 120
  max_hops: 5
feed_bot:
  enabled: true
  post_interval_min: 600
  post_interval_max: 1800
  reply_chance: 0.4
  react_chance: 0.6
security:
  require_approval: true
  max_friends: 50
  rate_limit: 10
paths:
  data_dir: data
  conversations_dir: data/conversations
  tunnels_dir: tunnels/peers
